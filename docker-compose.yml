version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: comicfair_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./comicfair_api/init_db:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - comicfair-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./comicfair_api
      dockerfile: Dockerfile
    container_name: comicfair_api
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "True"
      TZ: Asia/Shanghai
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./comicfair_api:/app
    networks:
      - comicfair-net
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py init_seed_data &&
             python manage.py runserver 0.0.0.0:8000"

  web:
    build:
      context: ./comicfair_web
      dockerfile: Dockerfile
    container_name: comicfair_web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - comicfair-net

volumes:
  mysql_data:

networks:
  comicfair-net:
    driver: bridge
